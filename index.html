<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bay of Lights - V15 Tri-Color Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --gold: #FFD700;
            --red: #FF3366;
            --blue: #00E5FF;
            --text-light: #f0f4f8;
        }

        body {
            margin: 0; overflow: hidden; background-color: #000;
            color: var(--text-light); font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; height: 100vh; user-select: none;
        }

        canvas { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; 
            display: block;
        }

        #top-bar {
            width: 100%; padding: 12px 30px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            box-sizing: border-box; z-index: 10; pointer-events: none;
        }

        .brand h1 {
            margin: 0; font-weight: 900; font-size: 24px;
            background: linear-gradient(90deg, var(--gold), #ffaa00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .brand span { font-size: 11px; color: #39FF14; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); text-transform: uppercase; font-weight: bold;}

        .stats { display: flex; gap: 20px; font-size: 16px; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); align-items: center;}
        .stats span { color: var(--gold); font-size: 19px;}

        /* BGM 控制按钮 */
        #btn-bgm {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;
            cursor: pointer; pointer-events: auto; transition: all 0.2s; backdrop-filter: blur(5px);
        }
        #btn-bgm:hover { background: rgba(255,255,255,0.2); }

        #global-multiplier {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            font-size: 64px; font-weight: 900; color: #fff;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.8); 
            z-index: 5; transition: color 0.3s;
            text-align: center; pointer-events: none;
        }
        #global-multiplier .label { font-size: 14px; font-weight: 900; color: #eee; text-transform: uppercase; letter-spacing: 2px; text-shadow: 1px 2px 5px rgba(0,0,0,0.8); display: block; margin-bottom: -10px;}

        #bottom-controls {
            position: absolute; bottom: 0; width: 100%;
            display: flex; flex-direction: column; z-index: 10;
            padding-bottom: 20px;
        }

        #action-bar {
            display: flex; justify-content: center; padding: 6px; margin-bottom: 10px;
        }

        #btn-launch-all {
            background: linear-gradient(45deg, rgba(68,68,68,0.7), rgba(102,102,102,0.7)); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px;
            padding: 8px 30px; font-size: 13px; font-weight: 900; color: white;
            cursor: pointer; text-transform: uppercase; transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }
        #btn-launch-all:hover { background: linear-gradient(45deg, #ff8c00, #e52e71); border-color: transparent; box-shadow: 0 4px 20px rgba(229, 46, 113, 0.6); }

        .lanes-container {
            display: flex; padding: 0 30px; gap: 15px; justify-content: center; overflow-x: auto;
        }

        .lane-panel {
            flex: 1; min-width: 160px; max-width: 280px;
            background: rgba(10, 15, 25, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; padding: 12px 15px; display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(255,255,255,0.08); transition: border-color 0.3s, box-shadow 0.3s; position: relative;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .lane-panel[data-lane="1"] { --lane-color: var(--gold); }
        .lane-panel[data-lane="2"] { --lane-color: var(--red); }
        .lane-panel[data-lane="3"] { --lane-color: var(--blue); }

        .lane-panel.is-rising { border-color: var(--lane-color); box-shadow: inset 0 0 20px rgba(255,255,255,0.03), 0 5px 20px rgba(0,0,0,0.5); }

        .lane-header { display: flex; justify-content: center; width: 100%; margin-bottom: 8px; font-size: 14px; font-weight: 900; color: var(--lane-color); letter-spacing: 1px;}
        .input-group { display: flex; flex-direction: column; width: 100%; margin-bottom: 8px; }
        .input-group label { font-size: 9px; color: #ddd; margin-bottom: 2px; text-transform: uppercase; font-weight: 700;}
        .input-group input {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
            color: white; padding: 6px; border-radius: 4px; text-align: center; font-weight: 700; font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus { outline: none; border-color: var(--lane-color); }

        .btn-action {
            margin-top: auto; width: 100%; padding: 12px 0; border: none;
            border-radius: 6px; color: white; font-weight: 900; font-size: 14px;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        
        .btn-action.state-idle { background: rgba(0,0,0,0.5); border: 1px solid var(--lane-color); color: var(--lane-color); }
        .btn-action.state-idle:hover { background: var(--lane-color); color: #000; box-shadow: 0 0 10px var(--lane-color);}
        .btn-action.state-rising { background: var(--lane-color); color: #000; box-shadow: 0 0 15px var(--lane-color); animation: pulse 1s infinite alternate;}
        .btn-action.state-won { background: #39FF14; color: #000; border: 1px solid #39FF14;}
        .btn-action.state-lost { background: rgba(0,0,0,0.5); color: #777; border: 1px solid #444; cursor: not-allowed; }

        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.02); } }
    </style>
</head>
<body>

    <audio id="bgm-audio" src="bgm.mp3" loop preload="auto"></audio>

    <canvas id="gameCanvas"></canvas>

    <div id="top-bar">
        <div class="brand">
            <h1>Bay of Lights</h1>
            <span>Tri-Color Tubes • 95.5% RTP</span>
        </div>
        <div class="stats">
            <button id="btn-bgm" onclick="toggleBGM()">🔊 BGM ON</button>
            <div>Last Win: <span id="ui-win">0.00</span></div>
            <div>Bank: <span id="ui-balance">10000.00</span></div>
        </div>
    </div>

    <div id="global-multiplier"><span class="label">Highest Multiplier</span><span id="highest-val">1.00x</span></div>

    <div id="bottom-controls">
        <div id="action-bar">
            <button id="btn-launch-all" onclick="igniteAllIdle()">⚡ Ignite All Tubes</button>
        </div>
        <div class="lanes-container" id="lanes-ui"></div>
    </div>

<script>
    // --- BGM 控制引擎 ---
    const bgmPlayer = document.getElementById('bgm-audio');
    bgmPlayer.volume = 0.5; 
    let bgmStarted = false;
    let bgmMuted = false;

    function toggleBGM() {
        bgmMuted = !bgmMuted;
        const btn = document.getElementById('btn-bgm');
        if (bgmMuted) {
            bgmPlayer.pause();
            btn.innerText = '🔇 BGM OFF';
        } else {
            if (bgmStarted) bgmPlayer.play();
            btn.innerText = '🔊 BGM ON';
        }
    }

    function tryStartBGM() {
        if (!bgmStarted && !bgmMuted) {
            bgmPlayer.play().then(() => {
                bgmStarted = true;
            }).catch(e => {
                console.log("Waiting for more direct interaction to play BGM.");
            });
        }
    }

    // --- 音效与心跳引擎 ---
    let audioCtx = null;
    const SoundEngine = {
        init() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        },
        playTone(freq, type, duration, vol=0.1) {
            this.init();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol * 1.5, audioCtx.currentTime + duration * 0.2);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        },
        playLaunch() { this.playTone(120, 'sawtooth', 0.8, 0.05); },
        playCashout() { this.playTone(523.25, 'sine', 0.3, 0.1); setTimeout(() => this.playTone(880, 'sine', 0.6, 0.1), 80); },
        playBurst() { 
            this.init();
            const bufferSize = audioCtx.sampleRate * 0.4; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            noise.connect(gain); gain.connect(audioCtx.destination); noise.start();
        },
        playCoinShower(tier) {
            this.init();
            let duration = tier >= 20 ? 2500 : 1200; 
            let steps = duration / 60;
            for(let i=0; i<steps; i++) {
                setTimeout(() => {
                    let freq = 1200 + Math.random() * 1000; 
                    this.playTone(freq, 'sine', 0.1, 0.02);
                }, i * 60 + Math.random() * 20); 
            }
        }
    };

    let lastPulseTime = 0;
    let pulseInterval = 800;

    // --- 核心状态与数据 ---
    let balance = 10000.00;
    let lastWin = 0.00;
    let darknessAlpha = 0; 
    let waterY = 600; 
    let cameraY = 0;

    const MULTI_GROWTH_RATE = 0.18;
    const SPEED_THRESHOLD_MULTI = 3.0; 
    const TIME_TO_THRESHOLD = Math.log(SPEED_THRESHOLD_MULTI) / MULTI_GROWTH_RATE;
    const TENSION_THRESHOLD = 4.0; 
    const HIGH_MULTI_THRESHOLD = 10.0; 

    const colors = ['#FFD700', '#FF3366', '#00E5FF']; 
    
    let lanes = Array.from({length: 3}, (_, i) => ({
        id: i, bet: 10, autoCashout: 0, color: colors[i],
        state: 'idle', burstPoint: 0, currentMulti: 1.00, startTime: 0,
        xBase: 0, worldY: 0, calculatedYOffset: 0
    }));

    function initUI() {
        const container = document.getElementById('lanes-ui');
        container.innerHTML = '';
        lanes.forEach(l => {
            const div = document.createElement('div');
            div.className = 'lane-panel'; div.dataset.lane = l.id + 1; div.id = `panel-${l.id}`;
            div.innerHTML = `
                <div class="lane-header"><span>TUBE ${l.id + 1}</span></div>
                <div class="input-group"><label>Bet Amount</label><input type="number" id="input-bet-${l.id}" value="${l.bet}" min="1" onchange="lanes[${l.id}].bet=parseFloat(this.value)||1"></div>
                <div class="input-group"><label>Auto (0=Off)</label><input type="number" id="input-auto-${l.id}" value="${l.autoCashout}" step="0.5" onchange="lanes[${l.id}].autoCashout=parseFloat(this.value)||0"></div>
                <button class="btn-action state-idle" id="btn-action-${l.id}" onclick="handleLaneAction(${l.id})">IGNITE</button>
            `;
            container.appendChild(div);
        });
        updateBalances();
    }

    function updateBalances() {
        document.getElementById('ui-balance').innerText = balance.toFixed(2);
        document.getElementById('ui-win').innerText = lastWin.toFixed(2);
    }

    // --- 动态编排的 95.5% RTP 计算引擎 ---
    function generateBurstPoint(laneId) {
        const baseTargetRTP = 0.955; 
        let u = Math.random();
        let burst = baseTargetRTP / (1 - u); 

        let activeOtherHighs = lanes.filter(l => l.id !== laneId && l.state === 'rising' && l.burstPoint >= TENSION_THRESHOLD).length;

        if (burst >= TENSION_THRESHOLD && activeOtherHighs >= 1) {
            if (Math.random() < 0.90) burst = 1.01 + Math.random() * 2.5; 
        } else if (burst < TENSION_THRESHOLD && activeOtherHighs === 0) {
            if (Math.random() < 0.08) burst = TENSION_THRESHOLD + Math.random() * 10;
        }

        if (burst < 1.01) return 1.00; 

        if (laneId === 0) return Math.min(burst, 1500);  
        if (laneId === 1) return Math.min(burst, 3000);  
        if (laneId === 2) return Math.min(burst, 8888); 

        return burst;
    }

    function igniteAllIdle() {
        tryStartBGM(); 
        SoundEngine.init();
        lanes.forEach(l => { if(l.state === 'idle') handleLaneAction(l.id); });
    }

    function handleLaneAction(id) {
        tryStartBGM(); 
        SoundEngine.init();
        const lane = lanes[id];

        if (lane.state === 'idle') {
            if (balance < lane.bet) return alert(`Insufficient demo balance!`);
            
            balance -= lane.bet; updateBalances();
            
            lane.state = 'rising'; lane.startTime = Date.now();
            lane.currentMulti = 1.00; 
            lane.burstPoint = generateBurstPoint(lane.id);
            lane.calculatedYOffset = 0;
            lane.worldY = waterY; 
            
            document.getElementById(`input-bet-${id}`).disabled = true;
            document.getElementById(`input-auto-${id}`).disabled = true;
            
            document.getElementById(`panel-${id}`).classList.add('is-rising');
            const btn = document.getElementById(`btn-action-${id}`);
            btn.className = 'btn-action state-rising'; btn.innerText = 'CASH OUT';

            SoundEngine.playLaunch();
            createBurst(lane.xBase, lane.worldY, lane.color, 25); 

        } else if (lane.state === 'rising') {
            processCashout(lane);
        }
    }

    function processCashout(lane) {
        lane.state = 'cashed_out';
        const winAmount = lane.bet * lane.currentMulti;
        lastWin = winAmount; balance += winAmount; updateBalances();
        
        const btn = document.getElementById(`btn-action-${lane.id}`);
        btn.className = 'btn-action state-won'; btn.innerText = `WON ${winAmount.toFixed(2)}`;
        
        SoundEngine.playCashout(); 
        createRadialBloom(lane.xBase, lane.worldY, '#39FF14', 40);

        if (lane.currentMulti >= 20) {
            triggerCoinShower(120); 
            SoundEngine.playCoinShower(20);
        } else if (lane.currentMulti >= 10) {
            triggerCoinShower(50);  
            SoundEngine.playCoinShower(10);
        }

        scheduleReset(lane);
    }

    function processBust(lane) {
        lane.state = 'busted'; lane.currentMulti = lane.burstPoint;
        
        const btn = document.getElementById(`btn-action-${lane.id}`);
        btn.className = 'btn-action state-lost'; btn.innerText = `BUST ${lane.burstPoint.toFixed(2)}x`;
        
        SoundEngine.playBurst(); 
        createRadialBloom(lane.xBase, lane.worldY, lane.color, 120, true);

        scheduleReset(lane);
    }

    function scheduleReset(lane) {
        document.getElementById(`panel-${lane.id}`).classList.remove('is-rising');
        setTimeout(() => {
            lane.state = 'idle'; lane.currentMulti = 1.00;
            document.getElementById(`input-bet-${lane.id}`).disabled = false;
            document.getElementById(`input-auto-${lane.id}`).disabled = false;
            const btn = document.getElementById(`btn-action-${lane.id}`);
            btn.className = 'btn-action state-idle'; btn.innerText = 'IGNITE';
        }, 2000); 
    }

    // --- 渲染与物理引擎 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let coins = []; 
    let stars = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const section = canvas.width / 3;
        lanes.forEach((l, i) => l.xBase = section * i + section/2);
        
        const uiHeight = document.getElementById('bottom-controls').offsetHeight || 200;
        waterY = canvas.height - uiHeight - 50; 

        stars = Array.from({length: 200}, () => ({
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height,
            size: Math.random() * 2.5, 
            blinkSpeed: Math.random() * 0.05 + 0.01, 
            alpha: Math.random()
        }));
    }
    window.addEventListener('resize', resize);

    class Particle {
        constructor(x, y, color, speed=1, premium=false, isRadial=false) {
            this.worldX = x; this.worldY = y; this.color = color;
            if (isRadial) {
                const angle = Math.random() * Math.PI * 2;
                const v = Math.random() * 8 * speed + 2;
                this.vx = Math.cos(angle) * v;
                this.vy = Math.sin(angle) * v;
                this.decay = Math.random() * 0.015 + 0.01; 
            } else {
                this.vx = (Math.random() - 0.5) * 16 * speed;
                this.vy = (Math.random() - 0.5) * 16 * speed;
                this.decay = Math.random() * 0.03 + 0.05; 
            }
            this.life = 1.0; 
            this.size = premium ? Math.random()*5+2 : Math.random()*2+1;
            this.premium = premium;
        }
        update() { 
            this.worldX += this.vx; 
            this.worldY += this.vy; 
            this.vy += 0.08; 
            this.life -= this.decay; 
        }
        draw(ctx, camY) {
            ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.worldX, this.worldY + camY, this.size, 0, Math.PI*2); ctx.fill();
            if(this.premium) { ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.fill(); ctx.shadowBlur = 0; }
            ctx.globalAlpha = 1.0;
        }
    }

    class Coin {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 15; 
            this.vy = Math.random() * -10 - 5; 
            this.gravity = 0.5;
            this.size = Math.random() * 10 + 12; 
            this.color = Math.random() > 0.3 ? '#FFD700' : '#FFA500'; 
            this.flip = Math.random() * Math.PI; 
            this.flipSpeed = Math.random() * 0.2 + 0.1; 
        }
        update() {
            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.flip += this.flipSpeed;
        }
        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(1, Math.abs(Math.sin(this.flip))); 
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(0, 0, this.size, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#DAA520';
            ctx.beginPath(); ctx.arc(0, 0, this.size * 0.65, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
    }

    function createBurst(x, y, color, count=30, premium=false) {
        for(let i=0; i<count; i++) particles.push(new Particle(x, y, color, premium?1.5:1, premium, false));
    }

    function createRadialBloom(x, y, color, count=100, isBust=false) {
        for(let i=0; i<count; i++) {
            let pColor = color;
            if (isBust && Math.random() > 0.7) pColor = '#FFFFFF';
            // 绽放爆炸时，副色调跟随轨道本身的颜色，而不是硬编码的金色
            if (isBust && Math.random() > 0.9) pColor = color; 
            particles.push(new Particle(x, y, pColor, 1.5, isBust, true));
        }
    }

    function triggerCoinShower(count) {
        for(let i=0; i<count; i++) {
            coins.push(new Coin(Math.random() * canvas.width, -50 - Math.random() * 100));
        }
    }

    function drawPalmTree(x, y, height) {
        ctx.fillStyle = '#060305'; ctx.strokeStyle = '#060305';
        ctx.beginPath(); ctx.moveTo(x, y);
        ctx.quadraticCurveTo(x + height * 0.05, y - height * 0.5, x, y - height);
        ctx.lineWidth = height * 0.05; ctx.stroke();
        ctx.save(); ctx.translate(x, y - height);
        for (let i = 0; i < 8; i++) {
            ctx.rotate(Math.PI / 4); ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(height * 0.2, height * 0.05, height * 0.3, height * 0.2);
            ctx.lineWidth = height * 0.02; ctx.stroke();
        }
        ctx.restore();
    }

    function drawSunsetAndSilhouettes(renderWaterY) {
        const w = canvas.width; const h = canvas.height;

        const skyGradient = ctx.createLinearGradient(0, 0, 0, renderWaterY);
        skyGradient.addColorStop(0, '#1b0a2e');
        skyGradient.addColorStop(0.5, '#a34866');
        skyGradient.addColorStop(1, '#ff8a47');
        ctx.fillStyle = skyGradient; ctx.fillRect(0, 0, w, h);

        if (renderWaterY < h) {
            const seaGradient = ctx.createLinearGradient(0, renderWaterY, 0, h);
            seaGradient.addColorStop(0, 'rgba(40, 15, 30, 0.9)');
            seaGradient.addColorStop(1, 'rgba(5, 5, 10, 0.95)');
            ctx.fillStyle = seaGradient; ctx.fillRect(0, renderWaterY, w, h - renderWaterY);
        }

        const sunY = renderWaterY - 60;
        const sunRadius = Math.min(w, h) * 0.08;
        ctx.beginPath(); ctx.arc(w * 0.2, sunY, sunRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#ffcf87'; ctx.shadowBlur = 80; ctx.shadowColor = '#ffcf87';
        ctx.fill(); ctx.shadowBlur = 0;

        if (darknessAlpha > 0) {
            ctx.fillStyle = `rgba(2, 5, 15, ${darknessAlpha})`;
            ctx.fillRect(0, 0, w, h);
            stars.forEach(s => {
                s.alpha += s.blinkSpeed;
                const currentAlpha = (Math.sin(s.alpha) * 0.5 + 0.5) * darknessAlpha;
                ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;
                ctx.beginPath(); 
                let starScreenY = (s.y + cameraY * 0.1) % canvas.height; 
                ctx.arc(s.x, starScreenY, s.size, 0, Math.PI*2); ctx.fill();
            });
        }

        ctx.fillStyle = '#060305'; 
        
        const globeX = w * 0.85; const globeY = renderWaterY - 20; const globeRadius = Math.min(w, h) * 0.05;
        ctx.beginPath(); ctx.arc(globeX, globeY, globeRadius, 0, Math.PI * 2); ctx.fill();
        ctx.fillRect(globeX - globeRadius * 0.3, globeY + globeRadius * 0.8, globeRadius * 0.6, globeRadius * 0.5);

        const wheelX = w * 0.65; const wheelY = renderWaterY - 80; const wheelRadius = Math.min(w, h) * 0.1;
        ctx.beginPath(); ctx.arc(wheelX, wheelY, wheelRadius, 0, Math.PI * 2);
        ctx.lineWidth = 4; ctx.strokeStyle = '#060305'; ctx.stroke();
        
        const time = Date.now() * 0.0003;
        for(let i=0; i<8; i++) {
            const angle = (i * Math.PI) / 4 + time;
            ctx.beginPath(); ctx.moveTo(wheelX, wheelY);
            ctx.lineTo(wheelX + Math.cos(angle)*wheelRadius, wheelY + Math.sin(angle)*wheelRadius); ctx.stroke();
        }
        ctx.beginPath(); ctx.moveTo(wheelX, wheelY); ctx.lineTo(wheelX - wheelRadius * 0.5, renderWaterY);
        ctx.moveTo(wheelX, wheelY); ctx.lineTo(wheelX + wheelRadius * 0.5, renderWaterY);
        ctx.lineWidth = 6; ctx.stroke();

        drawPalmTree(w * 0.1, renderWaterY, Math.min(w, h) * 0.12);
        drawPalmTree(w * 0.35, renderWaterY, Math.min(w, h) * 0.1);
        drawPalmTree(w * 0.95, renderWaterY, Math.min(w, h) * 0.15);
    }

    // --- 绘制独立颜色的春节灯笼基座 ---
    function drawBase(l, renderWaterY) {
        ctx.fillStyle = '#000'; ctx.fillRect(l.xBase - 22, renderWaterY - 10, 44, 45); 
        
        // 动态：根据轨道颜色，给灯笼主体设置相应的暗色系
        let baseBodyColor = l.color;
        if (l.id === 0) baseBodyColor = '#B8860B'; // 暗金
        if (l.id === 1) baseBodyColor = '#b71c1c'; // 暗红
        if (l.id === 2) baseBodyColor = '#0288D1'; // 暗蓝

        ctx.fillStyle = baseBodyColor; 
        ctx.fillRect(l.xBase - 18, renderWaterY - 10, 36, 40); 
        
        // 动态：装饰线条直接使用轨道的亮色
        ctx.strokeStyle = l.color; 
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(l.xBase - 18, renderWaterY - 10); ctx.lineTo(l.xBase + 18, renderWaterY - 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(l.xBase - 18, renderWaterY + 30); ctx.lineTo(l.xBase + 18, renderWaterY + 30); ctx.stroke();
        for(let i=1; i<4; i++) {
            ctx.beginPath(); ctx.moveTo(l.xBase - 18, renderWaterY - 10 + i*10); ctx.lineTo(l.xBase + 18, renderWaterY - 10 + i*10); ctx.stroke();
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let highestActiveMulti = 1.00; 
        let anyRising = false;
        let maxLaneOffset = 0; 

        lanes.forEach(l => {
            if (l.state === 'rising') {
                anyRising = true;
                const t = (Date.now() - l.startTime) / 1000;
                l.currentMulti = Math.max(1.00, Math.exp(MULTI_GROWTH_RATE * t)); 
                if (l.currentMulti > highestActiveMulti) highestActiveMulti = l.currentMulti;

                let yOff = 0;
                if (l.currentMulti <= SPEED_THRESHOLD_MULTI) { yOff = t * 65; } 
                else {
                    const tExcess = t - TIME_TO_THRESHOLD;
                    yOff = (TIME_TO_THRESHOLD * 65) + (tExcess * 150) + (Math.pow(tExcess, 2) * 50); 
                }
                
                l.calculatedYOffset = yOff;
                l.worldY = waterY - yOff; 

                if (yOff > maxLaneOffset) maxLaneOffset = yOff; 
            }
        });

        // --- 心跳张力引擎 ---
        if (anyRising) {
            let now = Date.now();
            if (now - lastPulseTime > pulseInterval) {
                lastPulseTime = now;
                if (highestActiveMulti < TENSION_THRESHOLD) {
                    pulseInterval = 800; 
                    SoundEngine.playTone(180, 'sine', 0.5, 0.05);
                } else {
                    let over4 = highestActiveMulti - TENSION_THRESHOLD;
                    pulseInterval = Math.max(100, 400 - over4 * 10); 
                    let freq = Math.min(1200, 300 + over4 * 30); 
                    SoundEngine.playTone(freq, 'sawtooth', pulseInterval / 1000 * 0.7, 0.08);
                }
            }
        }

        const globalMultiEl = document.getElementById('highest-val');
        if (anyRising) { globalMultiEl.innerText = highestActiveMulti.toFixed(2) + 'x'; } 
        else { globalMultiEl.innerText = 'FESTIVAL'; }

        if(highestActiveMulti >= HIGH_MULTI_THRESHOLD) darknessAlpha = Math.min(1.0, darknessAlpha + 0.015);
        else darknessAlpha = Math.max(0.0, darknessAlpha - 0.015);

        const panThreshold = canvas.height * 0.45;
        let targetCameraY = 0;
        if (maxLaneOffset > panThreshold) {
            targetCameraY = maxLaneOffset - panThreshold;
        }
        cameraY += (targetCameraY - cameraY) * 0.08; 
        let renderWaterY = waterY + cameraY;

        drawSunsetAndSilhouettes(renderWaterY);

        lanes.forEach(l => {
            drawBase(l, renderWaterY);

            if(l.state === 'rising') {
                let renderX = l.xBase; 
                let renderScreenY = l.worldY + cameraY; 

                if (cameraY > 200) { 
                    renderX += (Math.random() - 0.5) * 8; 
                    renderScreenY += (Math.random() - 0.5) * 8;
                }

                if(l.autoCashout > 1.00 && l.currentMulti >= l.autoCashout) processCashout(l);
                else if(l.currentMulti >= l.burstPoint) processBust(l);
                else {
                    ctx.shadowBlur = 20; ctx.shadowColor = l.color;
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(renderX, renderScreenY, 7, 0, Math.PI*2); ctx.fill();
                    
                    // 动态：强光核心颜色也使用当前轨道的专属颜色
                    ctx.shadowColor = l.color; ctx.fillStyle = l.color; 
                    ctx.beginPath(); ctx.arc(renderX, renderScreenY, 4, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    particles.push(new Particle(l.xBase, l.worldY + 12, l.color, cameraY > 200 ? 1.2 : 0.6, true, false));
                }
            }

            if(l.state !== 'idle') {
                let renderTextY = l.worldY + cameraY - 35;
                ctx.fillStyle = l.state === 'busted' ? '#ff4444' : (l.state === 'cashed_out' ? '#39FF14' : '#fff');
                ctx.font = 'bold 22px Montserrat'; ctx.textAlign = 'center';
                ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
                
                const dispVal = l.state === 'rising' ? l.currentMulti : l.burstPoint;
                const txt = l.state === 'cashed_out' ? 'WIN ' + dispVal.toFixed(2) + 'x' : dispVal.toFixed(2) + 'x';
                ctx.fillText(txt, l.xBase, renderTextY);
                ctx.shadowBlur = 0;
            }
        });

        for(let i=particles.length-1; i>=0; i--) {
            particles[i].update(); 
            particles[i].draw(ctx, cameraY);
            if(particles[i].life <= 0) particles.splice(i, 1);
        }

        for(let i=coins.length-1; i>=0; i--) {
            coins[i].update();
            coins[i].draw(ctx);
            if(coins[i].y > canvas.height + 50) coins.splice(i, 1);
        }
        
        requestAnimationFrame(gameLoop);
    }

    initUI(); 
    setTimeout(() => {
        resize();
        gameLoop(); 
    }, 50);
</script>
</body>
